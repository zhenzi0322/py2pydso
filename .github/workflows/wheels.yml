name: Build & Release & publish-pypi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    name: Build cp${{ matrix.python }} wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      
      - name: Clone Codeup private repo
        run: |
          git clone https://oauth2:${{ secrets.CODEUP_TOKEN }}@codeup.aliyun.com/zheniz0322/Python/packages/py2pydso.git demo
          ls ./

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Linux 编译依赖
      - name: Install Linux system compile toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential python3-dev

      # Windows VC编译工具
      - name: Install Windows VC++ build tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Python依赖
      - name: Install build dependencies
        run: pip install Pillow Cython setuptools wheel mypy

      # 执行自研构建脚本 --keep-tmp 异常时保留临时目录
      - name: Build protected wheel (keep tmp for debug)
        working-directory: demo
        run: python build_protected.py package --package-name py2pydso --output-dir ../wheelhouse --skip-stubgen --keep-tmp

      # 跨平台打印wheel列表
      - name: Print all built wheels in wheelhouse
        run: |
          python -c "
          import os
          print('=== wheelhouse directory contents ===')
          for filename in sorted(os.listdir('wheelhouse')):
              full_path = os.path.join('wheelhouse', filename)
              size = os.path.getsize(full_path)
              print(f'{filename:<50} {size} bytes')
          "

      # 强制前置校验：wheel无原生扩展直接退出，绝不进入auditwheel
      - name: Pre-check native extensions before auditwheel
        run: |
          python -c "
          import zipfile, glob, os, sys
          print('=== Strict wheel ELF/.pyd check ===')
          fail = False
          if sys.platform == 'linux':
              ext = '.so'
          elif sys.platform == 'darwin':
              ext = '.so'
          else:
              ext = '.pyd'
          whls = glob.glob('wheelhouse/*.whl')
          if not whls:
              print('NO WHEEL FOUND')
              sys.exit(1)
          for whl in whls:
              name = os.path.basename(whl)
              print(f'\nInspect {name}')
              zf = zipfile.ZipFile(whl)
              all_files = zf.namelist()
              print('All files inside wheel:')
              for f in sorted(all_files):
                  print(f'  {f}')
              ext_list = [f for f in all_files if f.endswith(ext)]
              print(f'Count {ext} = {len(ext_list)}')
              if len(ext_list) == 0:
                  print(f'ERROR: {name} missing compiled extensions')
                  fail = True
          if fail:
              print('\nABORT: Cannot run auditwheel on pure-python wheel')
              sys.exit(1)
          print('\nAll wheels passed check')
          "

      # 失败上传调试包
      - name: Upload debug artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-wheel-fail-cp${{ matrix.python }}-${{ matrix.os }}
          path: wheelhouse/

      # 上传产物
      - name: Upload built wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cp${{ matrix.python }}-${{ matrix.os }}
          path: wheelhouse/*.whl

  release:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: artifacts

      - name: Collect all wheels into dist
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;
          ls -la dist/

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  publish-pypi:
    needs: build-wheels
    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: artifacts

      - name: Collect wheels
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist